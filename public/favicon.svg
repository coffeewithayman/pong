<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#111"/>

  <!-- Left paddle -->
  <rect x="4" y="20" width="4" height="24" fill="#0f0" rx="1"/>

  <!-- Right paddle -->
  <rect x="56" y="20" width="4" height="24" fill="#0f0" rx="1"/>

  <!-- Ball (center top) -->
  <circle cx="32" cy="16" r="3" fill="#0f0"/>

  <!-- Motion trail -->
  <circle cx="32" cy="24" r="2" fill="#0f0" opacity="0.6"/>
  <circle cx="32" cy="30" r="1.5" fill="#0f0" opacity="0.4"/>

  <!-- Center line -->
  <line x1="32" y1="48" x2="32" y2="56" stroke="#0f0" stroke-width="1" opacity="0.5"/>
</svg>
